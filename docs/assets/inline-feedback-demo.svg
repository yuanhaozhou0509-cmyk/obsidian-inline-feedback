<svg width="980" height="560" viewBox="0 0 980 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="980" height="560" rx="18" fill="#f6f7f9"/>
  <rect x="28" y="28" width="924" height="504" rx="14" fill="#ffffff" stroke="#d9dee7"/>
  <rect x="28" y="28" width="924" height="46" rx="14" fill="#20242c"/>
  <text x="52" y="58" fill="#f4f7fb" font-family="Arial, sans-serif" font-size="17" font-weight="700">Obsidian - demo-note.md</text>
  <text x="68" y="124" fill="#1f2937" font-family="Arial, sans-serif" font-size="26" font-weight="700">AI Product Review</text>
  <text x="68" y="170" fill="#374151" font-family="Arial, sans-serif" font-size="17">AI copilots are now common in writing tools, but many review workflows still rely on</text>
  <rect x="610" y="151" width="205" height="28" rx="5" fill="#ffe27a" opacity="0.65"/>
  <text x="68" y="202" fill="#374151" font-family="Arial, sans-serif" font-size="17">scattered chat messages. The gap is not model quality alone. The gap is that writers</text>
  <text x="68" y="234" fill="#374151" font-family="Arial, sans-serif" font-size="17">need a precise way to show which sentence should change and why.</text>
  <g filter="url(#shadow)">
    <rect x="548" y="95" width="248" height="52" rx="12" fill="#111827"/>
    <text x="575" y="128" fill="#ffffff" font-family="Arial, sans-serif" font-size="15">Add feedback</text>
    <line x1="674" y1="106" x2="674" y2="136" stroke="#4b5563"/>
    <text x="696" y="128" fill="#ffffff" font-family="Arial, sans-serif" font-size="15">Save card</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="612" y="246" width="286" height="162" rx="12" fill="#ffffff" stroke="#d1d5db"/>
    <text x="634" y="279" fill="#111827" font-family="Arial, sans-serif" font-size="15" font-weight="700">Write feedback...</text>
    <rect x="634" y="296" width="242" height="62" rx="8" fill="#f3f4f6"/>
    <text x="648" y="324" fill="#4b5563" font-family="Arial, sans-serif" font-size="14">Give a concrete example</text>
    <text x="648" y="346" fill="#4b5563" font-family="Arial, sans-serif" font-size="14">of this pain point.</text>
    <rect x="692" y="371" width="76" height="28" rx="7" fill="#e5e7eb"/>
    <text x="710" y="390" fill="#374151" font-family="Arial, sans-serif" font-size="13">Cancel</text>
    <rect x="780" y="371" width="96" height="28" rx="7" fill="#2563eb"/>
    <text x="805" y="390" fill="#ffffff" font-family="Arial, sans-serif" font-size="13">Save</text>
  </g>
  <defs>
    <filter id="shadow" x="0" y="0" width="1000" height="600" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
  </defs>
</svg>

